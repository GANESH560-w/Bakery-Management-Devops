apiVersion: apps/v1
kind: Deployment
metadata:
  name: bakery-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bakery-frontend
  template:
    metadata:
      labels:
        app: bakery-frontend
    spec:
      containers:
      - name: frontend
        image: bakery-frontend:latest
        env:
        - name: BACKEND_UPSTREAM
          value: bakery-backend-service:8080
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bakery-frontend-service
spec:
  selector:
    app: bakery-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
