apiVersion: apps/v1
kind: Deployment
metadata:
  name: bakery-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bakery-backend
  template:
    metadata:
      labels:
        app: bakery-backend
    spec:
      containers:
      - name: backend
        image: bakery-backend:latest # Assuming image is built and tagged
        env:
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: bakery-config
              key: DB_URL
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bakery-backend-service
spec:
  selector:
    app: bakery-backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
